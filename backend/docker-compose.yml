# MediSense backend stack: api (8787) + postgres+pgvector + redis.
# `docker compose up -d` then `curl localhost:8787/api/health`.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: medisense
      POSTGRES_PASSWORD: medisense
      POSTGRES_DB: medisense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medisense -d medisense"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8787:8787"
    environment:
      DATABASE_URL: postgresql+asyncpg://medisense:medisense@postgres:5432/medisense
      REDIS_URL: redis://redis:6379/0
      DEV_AUTH: "true"
      LLM_REASONING: "false"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:8787"
      # Provide a real key + set LLM_REASONING=true to enable Zhipu GLM:
      ZHIPU_API_KEY: "${ZHIPU_API_KEY:-}"
      ZHIPU_BASE_URL: "${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}"
      WEB_CONCURRENCY: "4"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8787/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 25s
      retries: 5

volumes:
  pgdata:
